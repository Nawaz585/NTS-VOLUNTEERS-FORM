<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawaz Testing Service - Volunteer Recruitment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #1a73e8;
            --primary-dark: #0d47a1;
            --secondary: #ff6d00;
            --accent: #00c853;
            --light: #f8f9fa;
            --dark: #202124;
            --gray: #5f6368;
            --light-gray: #dadce0;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --hover-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            color: var(--dark);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header Styles */
        .header {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 25px 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
            animation: fadeInDown 0.8s ease-out;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .logo-container {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .logo i {
            font-size: 36px;
            color: var(--primary);
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 1.3rem;
            font-style: italic;
            opacity: 0.9;
            margin-left: 90px;
        }

        /* Form Container */
        .form-container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .form-header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--light-gray);
        }

        .form-header h2 {
            font-size: 2.2rem;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .form-header p {
            color: var(--gray);
            font-size: 1.1rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 25px;
            animation: slideInRight 0.5s ease-out both;
        }

        .form-group:nth-child(odd) {
            animation: slideInLeft 0.5s ease-out both;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark);
            font-size: 1.1rem;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--light-gray);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #fcfcfc;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.2);
            background-color: white;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .break-section {
            background: linear-gradient(90deg, var(--secondary), #ff9100);
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin: 40px 0;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(255, 109, 0, 0.3);
            animation: pulse 2s infinite;
        }

        /* Button Styles */
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(26, 115, 232, 0.4);
        }

        .btn-secondary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 200, 83, 0.3);
        }

        .btn-secondary:hover {
            background: #00b347;
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(0, 200, 83, 0.4);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        /* Admin Section */
        .admin-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.8s ease-out;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary-dark);
            font-size: 1.8rem;
        }

        .admin-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .applicant-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            display: none;
        }

        .applicant-table th {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: left;
        }

        .applicant-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--light-gray);
        }

        .applicant-table tr:hover {
            background-color: #f5f9ff;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 4px 12px rgba(255, 109, 0, 0.3);
            }
            50% {
                box-shadow: 0 4px 20px rgba(255, 109, 0, 0.5);
            }
            100% {
                box-shadow: 0 4px 12px rgba(255, 109, 0, 0.3);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2rem;
            }
            
            .header p {
                font-size: 1.1rem;
                margin-left: 0;
                text-align: center;
            }
            
            .logo-container {
                flex-direction: column;
                text-align: center;
            }
            
            .logo {
                margin-right: 0;
                margin-bottom: 15px;
            }
            
            .form-container {
                padding: 20px;
            }
            
            .btn-container {
                flex-direction: column;
            }
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            box-shadow: var(--card-shadow);
            z-index: 1000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.5s ease;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }

        .notification.success {
            background: var(--accent);
        }

        .notification.error {
            background: #ff3d00;
        }

        .notification.info {
            background: var(--primary);
        }

        /* Login Modal */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            display: none;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.5s ease-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-dark);
        }

        .login-form .form-group {
            animation: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <div class="logo">
                    <i class="fas fa-flask"></i>
                </div>
                <h1>Nawaz Testing Service</h1>
            </div>
            <p><i>Step forward to success</i></p>
        </header>

        <!-- Main Form -->
        <div class="form-container">
            <div class="form-header">
                <h2>Volunteer Recruitment Drive</h2>
                <p>Fill out the application form below to apply for volunteer opportunities</p>
            </div>

            <form id="applicationForm">
                <!-- Personal Information -->
                <div class="form-group">
                    <label class="form-label">1. Name</label>
                    <input type="text" class="form-input" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">2. Father's Name</label>
                    <input type="text" class="form-input" id="fname" placeholder="Enter your father's name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">3. CNIC</label>
                    <input type="text" class="form-input" id="cnic" placeholder="XXXXX-XXXXXXX-X" required pattern="[0-9]{5}-[0-9]{7}-[0-9]{1}">
                </div>

                <div class="form-group">
                    <label class="form-label">4. Contact No</label>
                    <input type="tel" class="form-input" id="contact" placeholder="03XX-XXXXXXX" required>
                </div>

                <div class="form-group">
                    <label class="form-label">5. Email</label>
                    <input type="email" class="form-input" id="email" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">6. Address</label>
                    <textarea class="form-textarea" id="address" placeholder="Enter your complete address" rows="3" required></textarea>
                </div>

                <!-- Break Section -->
                <div class="break-section">
                    Additional Information
                </div>

                <!-- Additional Information -->
                <div class="form-group">
                    <label class="form-label">7. Education (University)</label>
                    <input type="text" class="form-input" id="education" placeholder="Enter your university name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">8. Skills/Degree</label>
                    <input type="text" class="form-input" id="skills" placeholder="e.g., BS Computer Science, Web Development" required>
                </div>

                <div class="form-group">
                    <label class="form-label">9. What you know about Volunteer</label>
                    <textarea class="form-textarea" id="volunteerKnowledge" placeholder="Describe your understanding of volunteer work" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">10. Why choose Nawaz Testing Service</label>
                    <textarea class="form-textarea" id="whyNTS" placeholder="Explain why you want to volunteer with Nawaz Testing Service" rows="3" required></textarea>
                </div>

                <div class="btn-container">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> Submit Application
                    </button>
                    <button type="button" class="btn btn-secondary" id="adminBtn">
                        <i class="fas fa-user-lock"></i> Admin Login
                    </button>
                </div>
            </form>
        </div>

        <!-- Admin Section -->
        <div class="admin-section" id="adminSection">
            <h3 class="admin-header">Admin Panel - Nawaz Testing Service</h3>
            
            <div class="admin-controls">
                <button class="btn btn-primary" id="viewApplications">
                    <i class="fas fa-list"></i> View Applications
                </button>
                <button class="btn btn-secondary" id="downloadData">
                    <i class="fas fa-download"></i> Download Data (CSV)
                </button>
                <button class="btn" id="logoutAdmin" style="background: #f1f3f4; color: var(--dark);">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>

            <table class="applicant-table" id="applicantTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>CNIC</th>
                        <th>Contact</th>
                        <th>Email</th>
                        <th>Education</th>
                        <th>Applied Date</th>
                    </tr>
                </thead>
                <tbody id="applicantTableBody">
                    <!-- Data will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="login-modal" id="loginModal">
        <div class="login-box">
            <h3 class="login-header">Admin Login</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="adminEmail" placeholder="nawaztestingservice@gmail.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="adminPassword" placeholder="Enter password" required>
                </div>
                <div class="btn-container">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    <button type="button" class="btn" id="cancelLogin" style="background: #f1f3f4; color: var(--dark);">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Area -->
    <div class="notification" id="notification"></div>

    <script>
        // Database simulation using localStorage
        const DB_NAME = "nts_applications";
        const ADMIN_EMAIL = "nawaztestingservice@gmail.com";
        const ADMIN_PASSWORD = "AdminNTS240";

        // Initialize database if not exists
        function initDatabase() {
            if (!localStorage.getItem(DB_NAME)) {
                localStorage.setItem(DB_NAME, JSON.stringify([]));
            }
        }

        // Get all applications
        function getApplications() {
            const data = localStorage.getItem(DB_NAME);
            return data ? JSON.parse(data) : [];
        }

        // Save a new application
        function saveApplication(application) {
            const applications = getApplications();
            application.id = Date.now(); // Unique ID
            application.submissionDate = new Date().toLocaleString();
            applications.push(application);
            localStorage.setItem(DB_NAME, JSON.stringify(applications));
            return application.id;
        }

        // Show notification
        function showNotification(message, type = "success") {
            const notification = document.getElementById("notification");
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            
            setTimeout(() => {
                notification.classList.remove("show");
            }, 4000);
        }

        // Handle form submission
        document.getElementById("applicationForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const application = {
                name: document.getElementById("name").value,
                fname: document.getElementById("fname").value,
                cnic: document.getElementById("cnic").value,
                contact: document.getElementById("contact").value,
                email: document.getElementById("email").value,
                address: document.getElementById("address").value,
                education: document.getElementById("education").value,
                skills: document.getElementById("skills").value,
                volunteerKnowledge: document.getElementById("volunteerKnowledge").value,
                whyNTS: document.getElementById("whyNTS").value
            };
            
            saveApplication(application);
            showNotification("Application submitted successfully! Thank you for your interest.", "success");
            
            // Reset form
            this.reset();
            
            // Add animation to form
            const formContainer = document.querySelector(".form-container");
            formContainer.style.animation = "none";
            setTimeout(() => {
                formContainer.style.animation = "pulse 0.5s ease-out";
            }, 10);
        });

        // Admin login functionality
        document.getElementById("adminBtn").addEventListener("click", function() {
            document.getElementById("loginModal").style.display = "flex";
        });

        document.getElementById("cancelLogin").addEventListener("click", function() {
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("loginForm").reset();
        });

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const email = document.getElementById("adminEmail").value;
            const password = document.getElementById("adminPassword").value;
            
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                document.getElementById("loginModal").style.display = "none";
                document.getElementById("adminSection").style.display = "block";
                document.getElementById("loginForm").reset();
                showNotification("Admin login successful!", "success");
                
                // Scroll to admin section
                document.getElementById("adminSection").scrollIntoView({ behavior: "smooth" });
            } else {
                showNotification("Invalid email or password!", "error");
            }
        });

        // View applications
        document.getElementById("viewApplications").addEventListener("click", function() {
            const applications = getApplications();
            const tableBody = document.getElementById("applicantTableBody");
            const table = document.getElementById("applicantTable");
            
            if (applications.length === 0) {
                showNotification("No applications found.", "info");
                return;
            }
            
            tableBody.innerHTML = "";
            
            applications.forEach(app => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${app.name}</td>
                    <td>${app.cnic}</td>
                    <td>${app.contact}</td>
                    <td>${app.email}</td>
                    <td>${app.edducation}</td>
                    <td>${app.submissionDate}</td>
                `;
                tableBody.appendChild(row);
            });
            
            table.style.display = "table";
            showNotification(`Loaded ${applications.length} applications`, "info");
        });

        // Download data as CSV
        document.getElementById("downloadData").addEventListener("click", function() {
            const applications = getApplications();
            
            if (applications.length === 0) {
                showNotification("No data to download.", "info");
                return;
            }
            
            // Create CSV content
            const headers = ["Name", "Father's Name", "CNIC", "Contact", "Email", "Address", "Education", "Skills", "Volunteer Knowledge", "Why NTS", "Submission Date"];
            const csvRows = [];
            
            // Add headers
            csvRows.push(headers.join(","));
            
            // Add data rows
            applications.forEach(app => {
                const row = [
                    `"${app.name}"`,
                    `"${app.fname}"`,
                    `"${app.cnic}"`,
                    `"${app.contact}"`,
                    `"${app.email}"`,
                    `"${app.address}"`,
                    `"${app.education}"`,
                    `"${app.skills}"`,
                    `"${app.volunteerKnowledge}"`,
                    `"${app.whyNTS}"`,
                    `"${app.submissionDate}"`
                ];
                csvRows.push(row.join(","));
            });
            
            const csvString = csvRows.join("\n");
            const blob = new Blob([csvString], { type: "text/csv" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "nts_applications.csv";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showNotification(`Downloaded ${applications.length} applications as CSV`, "success");
        });

        // Logout admin
        document.getElementById("logoutAdmin").addEventListener("click", function() {
            document.getElementById("adminSection").style.display = "none";
            document.getElementById("applicantTable").style.display = "none";
            showNotification("Admin logged out successfully.", "info");
        });

        // Form validation patterns
        document.getElementById("cnic").addEventListener("input", function(e) {
            let value = e.target.value.replace(/\D/g, '');
            
            if (value.length > 13) {
                value = value.substring(0, 13);
            }
            
            if (value.length > 5) {
                value = value.substring(0, 5) + '-' + value.substring(5);
            }
            if (value.length > 13) {
                value = value.substring(0, 13) + '-' + value.substring(13);
            }
            
            e.target.value = value;
        });

        document.getElementById("contact").addEventListener("input", function(e) {
            let value = e.target.value.replace(/\D/g, '');
            
            if (value.length > 11) {
                value = value.substring(0, 11);
            }
            
            if (value.length > 4) {
                value = value.substring(0, 4) + '-' + value.substring(4);
            }
            
            e.target.value = value;
        });

        // Initialize database on page load
        window.addEventListener("DOMContentLoaded", function() {
            initDatabase();
            
            // Add some sample data if database is empty (for demo purposes)
            const applications = getApplications();
            if (applications.length === 0) {
                // Add a sample application
                const sampleApp = {
                    name: "Ali Ahmed",
                    fname: "Ahmed Khan",
                    cnic: "12345-6789012-3",
                    contact: "0300-1234567",
                    email: "ali.ahmed@example.com",
                    address: "House #123, Street 45, Islamabad",
                    education: "National University of Sciences and Technology",
                    skills: "BS Computer Science, Web Development",
                    volunteerKnowledge: "Volunteering is about offering services for community development without expecting financial gain.",
                    whyNTS: "I want to contribute to educational testing services that help students achieve their goals.",
                    submissionDate: new Date().toLocaleString()
                };
                applications.push(sampleApp);
                localStorage.setItem(DB_NAME, JSON.stringify(applications));
            }
            
            // Add some animations to form elements on scroll
            const formGroups = document.querySelectorAll(".form-group");
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = "1";
                        entry.target.style.transform = "translateX(0)";
                    }
                });
            }, { threshold: 0.1 });
            
            formGroups.forEach(group => {
                group.style.opacity = "0";
                group.style.transform = "translateX(20px)";
                group.style.transition = "opacity 0.5s ease, transform 0.5s ease";
                observer.observe(group);
            });
        });
    </script>
</body>
</html>
